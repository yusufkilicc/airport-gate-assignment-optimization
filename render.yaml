# Render blueprint — one-click deploy of the Dash dashboard.
# In the Render dashboard: New → Blueprint → point at this repo.
services:
  - type: web
    name: airport-gate-optimization
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --chdir src dashboard:server --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
